name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install CocoaPods dependencies
        run: pod install --repo-update

      - name: Create iOS simulator
        run: |
          set -euo pipefail
          python3 .github/scripts/create-ios-simulator.py "Pandatrack CI iPhone"

      - name: Build app
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace Chronos.xcworkspace \
            -scheme Pandatrack \
            -destination "platform=iOS Simulator,id=${PANDATRACK_SIMULATOR_UDID}" \
            CODE_SIGNING_ALLOWED=NO

  unit-tests:
    name: Unit Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install CocoaPods dependencies
        run: pod install --repo-update

      - name: Create iOS simulator
        run: |
          set -euo pipefail
          python3 .github/scripts/create-ios-simulator.py "Pandatrack CI iPhone"

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace Chronos.xcworkspace \
            -scheme Pandatrack \
            -destination "platform=iOS Simulator,id=${PANDATRACK_SIMULATOR_UDID}" \
            -only-testing:ChronosTests \
            CODE_SIGNING_ALLOWED=NO

  instrumented-tests:
    name: Instrumented Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install CocoaPods dependencies
        run: pod install --repo-update

      - name: Create iOS simulator
        run: |
          set -euo pipefail
          python3 .github/scripts/create-ios-simulator.py "Pandatrack CI iPhone"

      - name: Run instrumented tests
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace Chronos.xcworkspace \
            -scheme Pandatrack \
            -destination "platform=iOS Simulator,id=${PANDATRACK_SIMULATOR_UDID}" \
            -only-testing:ChronosUITests \
            CODE_SIGNING_ALLOWED=NO
